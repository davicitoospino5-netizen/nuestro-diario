<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Diario</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e2d5a">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: #f4efe6; color: #1e2d5a; font-family: 'Georgia', serif; }
        .notebook-lines { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(#e6decb 1px, transparent 1px); background-size: 100% 28px; pointer-events: none; z-index: 1; opacity: 0.4; }
        .menu-btn { position: fixed; top: 24px; right: 24px; width: 44px; height: 54px; z-index: 100; cursor: pointer; background: none; border: none; }
        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100vh; background-color: #f4efe6; box-shadow: -5px 0 25px rgba(30, 45, 90, 0.08); z-index: 90; transition: right 0.4s; padding: 90px 24px; }
        .sidebar.open { right: 0; }
        .menu-item { padding: 12px 0; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; border-bottom: 1px solid rgba(30,45,90,0.04); }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 60px 24px; position: relative; z-index: 2; }
        .view-section { display: none; width: 100%; }
        .view-section.active-view { display: block; }
        .section-heading { font-size: 1.4rem; font-weight: 600; margin-bottom: 25px; border-bottom: 1px dashed rgba(30,45,90,0.2); padding-bottom: 10px; }
        .poem-card { position: relative; padding-left: 50px; margin-bottom: 45px; }
        .text-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(30,45,90,0.15); border-radius: 8px; }
        .btn-premium { width: 100%; padding: 12px; background-color: #1e2d5a; color: #f4efe6; border: none; border-radius: 6px; cursor: pointer; }
        .btn-secondary { width: 100%; padding: 10px; background: transparent; border: 1px solid #1e2d5a; cursor: pointer; border-radius: 6px; }
        .fer-letter-card { background-color: #fdfbf7; border: 1px solid rgba(138, 109, 81, 0.2); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 30px; }
        .gallery-item img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="notebook-lines"></div>
    <button class="menu-btn" id="menu-toggle">☰</button>
    <nav class="sidebar" id="sidebar-menu">
        <ul class="menu-options">
            <li class="menu-item active" data-view="view-poemas">Poemas</li>
            <li class="menu-item" data-view="view-notas">Rincón de Fer</li>
            <li class="menu-item" data-view="view-dibujos">Lienzo</li>
        </ul>
    </nav>

    <div class="app-container">
        <section id="view-poemas" class="view-section active-view">
            <div id="timeline-container">Cargando...</div>
        </section>

        <section id="view-notas" class="view-section">
            <h2 class="section-heading">Tu Rincón Secreto</h2>
            <input type="text" id="note-title" class="text-box" placeholder="Título...">
            <textarea id="note-text" class="text-box" rows="4" placeholder="Escribe aquí..."></textarea>
            <button id="add-note-btn" class="btn-premium">Guardar susurro</button>
            <button id="clear-notes-btn" class="btn-secondary" style="margin-top: 10px; color: #8a6d51; border-color: #8a6d51;">Borrar todo</button>
            <div id="notes-container" class="notes-list"></div>
        </section>

        <section id="view-dibujos" class="view-section">
            <h2 class="section-heading">Lienzo</h2>
            <canvas id="drawing-canvas" width="320" height="320" style="border:1px solid #000;"></canvas>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button id="clear-canvas" class="btn-secondary">Limpiar</button>
                <button id="save-canvas" class="btn-premium">Guardar</button>
            </div>
            <div id="gallery-container" class="gallery-grid"></div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBkcbOf9oXR7Gt_DEql_Q09epDhsTsi1yo",
            authDomain: "nuestro-diario-fer.firebaseapp.com",
            projectId: "nuestro-diario-fer",
            storageBucket: "nuestro-diario-fer.firebasestorage.app",
            messagingSenderId: "440739775091",
            appId: "1:440739775091:web:aad9afcb1ba42ab6086006"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Lógica de navegación
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
                document.getElementById(item.dataset.view).classList.add('active-view');
                document.getElementById('sidebar-menu').classList.remove('open');
            });
        });
        document.getElementById('menu-toggle').addEventListener('click', () => document.getElementById('sidebar-menu').classList.toggle('open'));

        // Firebase: Notas
        document.getElementById('add-note-btn').addEventListener('click', () => {
            const title = document.getElementById('note-title').value;
            const text = document.getElementById('note-text').value;
            if(text) database.ref('cartas_fer').push({titulo: title, texto: text, timestamp: Date.now()});
        });

        document.getElementById('clear-notes-btn').addEventListener('click', () => {
            if(confirm("¿Borrar todo?")) database.ref('cartas_fer').remove();
        });

        database.ref('cartas_fer').on('value', (snap) => {
            const container = document.getElementById('notes-container');
            container.innerHTML = "";
            snap.forEach(s => {
                const c = s.val();
                container.innerHTML += `<div class="fer-letter-card"><h4>${c.titulo}</h4><p>${c.texto}</p></div>`;
            });
        });

        // Firebase: Lienzo
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => drawing = false;
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        };

        document.getElementById('save-canvas').addEventListener('click', () => {
            database.ref('galeria').push({ src: canvas.toDataURL(), ts: Date.now() });
            ctx.clearRect(0,0,320,320);
        });

        database.ref('galeria').on('value', (snap) => {
            const cont = document.getElementById('gallery-container');
            cont.innerHTML = "";
            snap.forEach(s => cont.innerHTML += `<div class="gallery-item"><img src="${s.val().src}"></div>`);
        });
    </script>
</body>
</html>
